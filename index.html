<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Streak Diary</title>
<meta name="theme-color" content="#FF6B6B" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #FFFDF7;
    font-family: 'Inter', sans-serif;
    color: #2b2b2b;
    padding: 32px 16px 60px;
  }
  .container { max-width: 640px; margin: 0 auto; }
  .header {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
  }
  .eyebrow {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 700; letter-spacing: 1px;
    color: #8E5FD6; margin-bottom: 4px;
  }
  h1 { font-family: 'Baloo 2', sans-serif; font-size: 32px; font-weight: 800; margin: 0; }
  .add-btn {
    display: flex; align-items: center; gap: 6px;
    background: #2b2b2b; color: #fff; border: none; border-radius: 999px;
    padding: 10px 18px; font-weight: 700; font-size: 14px; cursor: pointer;
  }
  .empty {
    text-align: center; padding: 48px 20px; background: #FBF8F1;
    border-radius: 20px; border: 2px dashed #e5e1d6;
  }
  .list { display: flex; flex-direction: column; gap: 16px; }
  .card {
    background: #fff; border-radius: 20px; padding: 18px; border: 2px solid;
    box-shadow: 0 2px 0 rgba(0,0,0,0.04);
  }
  .card-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .habit-name { font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 17px; }
  .streak-pill {
    display: flex; align-items: center; gap: 4px; font-weight: 800; font-size: 14px;
    border-radius: 999px; padding: 4px 10px;
  }
  .icon-btn { background: none; border: none; cursor: pointer; color: #a39d8c; padding: 4px; }
  .days { display: flex; justify-content: space-between; gap: 6px; }
  .day-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .day-label { font-size: 11px; color: #a39d8c; }
  .day-chip {
    width: 34px; height: 34px; border-radius: 12px; font-weight: 700; font-size: 13px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; border: 2px solid transparent;
  }
  .note-dot { width: 6px; height: 6px; border-radius: 50%; border: none; cursor: pointer; padding: 0; }
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex;
    align-items: center; justify-content: center; padding: 20px; z-index: 50;
  }
  .modal { background: #fff; border-radius: 20px; padding: 22px; width: 100%; max-width: 380px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  input[type=text], textarea {
    width: 100%; padding: 10px 14px; border-radius: 12px; border: 2px solid #e5e1d6;
    font-size: 14px; font-family: 'Inter', sans-serif; box-sizing: border-box;
  }
  textarea { min-height: 100px; resize: vertical; margin-bottom: 14px; }
  .primary-btn {
    width: 100%; background: #2b2b2b; color: #fff; border: none; border-radius: 12px;
    padding: 12px 0; font-weight: 700; font-size: 14px; cursor: pointer; margin-top: 14px;
  }
  .swatches { display: flex; gap: 8px; margin: 14px 0; }
  .swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div>
      <div class="eyebrow">📓 MY STREAK DIARY</div>
      <h1>Keep the chain going</h1>
    </div>
    <button class="add-btn" id="openAddBtn">+ New habit</button>
  </header>

  <div class="empty hidden" id="emptyState">
    <div style="font-weight:700;font-size:18px;margin-bottom:4px;">No habits yet</div>
    <div style="opacity:0.7;margin-bottom:16px;">Add your first one — reading, workout, journaling, anything.</div>
    <button class="add-btn" id="openAddBtn2">+ Add a habit</button>
  </div>

  <div class="list" id="habitList"></div>
</div>

<div class="modal-backdrop hidden" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div style="font-weight:800;font-size:18px;">New habit</div>
      <button class="icon-btn" id="closeAddBtn">✕</button>
    </div>
    <input type="text" id="habitNameInput" placeholder="e.g. Read 10 pages" />
    <div class="swatches" id="swatchRow"></div>
    <button class="primary-btn" id="saveHabitBtn">Add habit</button>
  </div>
</div>

<div class="modal-backdrop hidden" id="noteModal">
  <div class="modal">
    <div class="modal-header">
      <div style="font-weight:800;font-size:18px;" id="noteModalTitle">Note</div>
      <button class="icon-btn" id="closeNoteBtn">✕</button>
    </div>
    <textarea id="noteTextarea" placeholder="How did it go today?"></textarea>
    <button class="primary-btn" id="saveNoteBtn">Save note</button>
  </div>
</div>

<script>
const PALETTE = [
  { name: "coral", bg: "#FF6B6B", soft: "#FFE3E3" },
  { name: "sun", bg: "#FFB627", soft: "#FFF1D6" },
  { name: "teal", bg: "#2EC4B6", soft: "#DAF6F3" },
  { name: "plum", bg: "#8E5FD6", soft: "#EEE3FA" },
  { name: "pink", bg: "#FF5DA2", soft: "#FFE1EF" },
  { name: "sky", bg: "#3E92CC", soft: "#DCEEFA" },
];
const STORAGE_KEY = "streak-diary-habits-v1";

function loadHabits() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}
function saveHabits(habits) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
}
function todayStr() { return new Date().toISOString().slice(0,10); }
function dateStr(offset) {
  const d = new Date(); d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0,10);
}
function dayLabel(offset) {
  const d = new Date(); d.setDate(d.getDate() + offset);
  return d.toLocaleDateString(undefined, { weekday: "short" }).slice(0,2);
}
function dateNum(offset) {
  const d = new Date(); d.setDate(d.getDate() + offset);
  return d.getDate();
}
function computeStreak(entries) {
  let streak = 0;
  let offset = (entries[todayStr()] && entries[todayStr()].done) ? 0 : -1;
  if (offset === -1 && !(entries[dateStr(-1)] && entries[dateStr(-1)].done)) return 0;
  while (entries[dateStr(offset)] && entries[dateStr(offset)].done) {
    streak += 1; offset -= 1;
  }
  return streak;
}

let habits = loadHabits();
let newHabitColor = PALETTE[0].name;
let activeNote = null; // {habitId, offset}

const habitList = document.getElementById("habitList");
const emptyState = document.getElementById("emptyState");
const days = [-6,-5,-4,-3,-2,-1,0];

function render() {
  saveHabits(habits);
  habitList.innerHTML = "";
  emptyState.classList.toggle("hidden", habits.length > 0);

  habits.forEach(h => {
    const color = PALETTE.find(p => p.name === h.color) || PALETTE[0];
    const streak = computeStreak(h.entries);

    const card = document.createElement("div");
    card.className = "card";
    card.style.borderColor = color.bg;

    const header = document.createElement("div");
    header.className = "card-header";
    header.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="dot" style="background:${color.bg}"></span>
        <span class="habit-name">${escapeHtml(h.name)}</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="streak-pill" style="background:${color.soft};color:${color.bg}">🔥 ${streak}</div>
        <button class="icon-btn" data-delete="${h.id}">🗑</button>
      </div>
    `;
    card.appendChild(header);

    const daysRow = document.createElement("div");
    daysRow.className = "days";
    days.forEach(offset => {
      const ds = dateStr(offset);
      const entry = h.entries[ds] || {};
      const isToday = offset === 0;
      const col = document.createElement("div");
      col.className = "day-col";
      col.innerHTML = `
        <div class="day-label" style="font-weight:${isToday ? 800 : 500}">${dayLabel(offset)}</div>
        <button class="day-chip" data-toggle="${h.id}|${offset}"
          style="background:${entry.done ? color.bg : '#F4F1EA'};color:${entry.done ? '#fff' : '#8a8577'};border-color:${isToday ? color.bg : 'transparent'}">
          ${dateNum(offset)}
        </button>
        <button class="note-dot" data-note="${h.id}|${offset}" style="background:${entry.note ? color.bg : '#e5e1d6'}"></button>
      `;
      daysRow.appendChild(col);
    });
    card.appendChild(daysRow);
    habitList.appendChild(card);
  });
}

function escapeHtml(s) {
  const div = document.createElement("div");
  div.textContent = s;
  return div.innerHTML;
}

habitList.addEventListener("click", (e) => {
  const del = e.target.closest("[data-delete]");
  const toggle = e.target.closest("[data-toggle]");
  const note = e.target.closest("[data-note]");
  if (del) {
    habits = habits.filter(h => h.id !== del.dataset.delete);
    render();
  } else if (toggle) {
    const [id, offset] = toggle.dataset.toggle.split("|");
    const h = habits.find(x => x.id === id);
    const ds = dateStr(Number(offset));
    const entry = h.entries[ds] || {};
    h.entries[ds] = { ...entry, done: !entry.done };
    render();
  } else if (note) {
    const [id, offset] = note.dataset.note.split("|");
    openNoteModal(id, Number(offset));
  }
});

// Add habit modal
const addModal = document.getElementById("addModal");
const swatchRow = document.getElementById("swatchRow");
PALETTE.forEach(p => {
  const sw = document.createElement("button");
  sw.className = "swatch";
  sw.style.background = p.bg;
  sw.dataset.color = p.name;
  sw.style.borderColor = p.name === newHabitColor ? "#2b2b2b" : "transparent";
  sw.addEventListener("click", () => {
    newHabitColor = p.name;
    [...swatchRow.children].forEach(c => c.style.borderColor = "transparent");
    sw.style.borderColor = "#2b2b2b";
  });
  swatchRow.appendChild(sw);
});

function openAddModal() { addModal.classList.remove("hidden"); document.getElementById("habitNameInput").focus(); }
document.getElementById("openAddBtn").addEventListener("click", openAddModal);
document.getElementById("openAddBtn2").addEventListener("click", openAddModal);
document.getElementById("closeAddBtn").addEventListener("click", () => addModal.classList.add("hidden"));
document.getElementById("saveHabitBtn").addEventListener("click", () => {
  const input = document.getElementById("habitNameInput");
  const name = input.value.trim();
  if (!name) return;
  habits.push({ id: Date.now().toString(), name, color: newHabitColor, entries: {} });
  input.value = "";
  addModal.classList.add("hidden");
  render();
});
document.getElementById("habitNameInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("saveHabitBtn").click();
});

// Note modal
const noteModal = document.getElementById("noteModal");
const noteTextarea = document.getElementById("noteTextarea");
function openNoteModal(habitId, offset) {
  const h = habits.find(x => x.id === habitId);
  const ds = dateStr(offset);
  activeNote = { habitId, offset };
  document.getElementById("noteModalTitle").textContent = "Note — " + ds;
  noteTextarea.value = (h.entries[ds] && h.entries[ds].note) || "";
  noteModal.classList.remove("hidden");
  noteTextarea.focus();
}
document.getElementById("closeNoteBtn").addEventListener("click", () => noteModal.classList.add("hidden"));
document.getElementById("saveNoteBtn").addEventListener("click", () => {
  if (!activeNote) return;
  const h = habits.find(x => x.id === activeNote.habitId);
  const ds = dateStr(activeNote.offset);
  const entry = h.entries[ds] || {};
  h.entries[ds] = { ...entry, note: noteTextarea.value };
  noteModal.classList.add("hidden");
  render();
});

render();

// Register service worker for offline support
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js").catch(() => {});
  });
}
</script>
</body>
</html>
